name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lemonade-admin
      - uses: actions/checkout@v4
        with:
          repository: bong-water-water-bong/lemonade-store
          path: lemonade-store
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e ../lemonade-store
        working-directory: lemonade-admin
      - run: python -m pip install -e '.[dev]'
        working-directory: lemonade-admin
      - run: python -m ruff check src tests
        working-directory: lemonade-admin
      - run: python -m ruff format --check src tests
        working-directory: lemonade-admin
      - run: python -m mypy
        working-directory: lemonade-admin
      - run: python -m pytest
        working-directory: lemonade-admin
